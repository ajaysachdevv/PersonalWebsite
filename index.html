<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajay Sachdev</title>
    <meta name="description" content="Ajay Sachdev -- Finance & Operations Manager.">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#08080c">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%238b5cf6'/%3E%3Cstop offset='100%25' stop-color='%2334d399'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='8' fill='%230e0e14'/%3E%3Ctext x='16' y='23' font-family='system-ui%2C sans-serif' font-weight='700' font-size='18' fill='url(%23g)' text-anchor='middle' letter-spacing='-1'%3EAS%3C/text%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #08080c;
            color: #f0eff2;
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .grain {
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 10;
        }

        .landing {
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(2.4rem, 6vw, 4.8rem);
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1.1;
            opacity: 0;
            transform: translateY(20px);
            animation: rise 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
        }

        .role {
            font-size: clamp(0.85rem, 1.6vw, 1.05rem);
            font-weight: 300;
            color: rgba(240, 239, 242, 0.4);
            margin-top: 0.75rem;
            letter-spacing: 0.04em;
            opacity: 0;
            transform: translateY(12px);
            animation: rise 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
        }

        @keyframes rise {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .name, .role {
                animation: none;
                opacity: 1;
                transform: none;
            }
        }
    </style>
</head>
<body>
    <div class="grain" aria-hidden="true"></div>
    <div class="landing">
        <h1 class="name">Ajay Sachdev</h1>
        <p class="role">Finance & Operations Manager</p>
    </div>
</body>
</html>
