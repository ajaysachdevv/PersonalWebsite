<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajay Sachdev</title>
    <meta name="description" content="Ajay Sachdev -- Finance & Operations Manager.">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#08080c">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%238b5cf6'/%3E%3Cstop offset='100%25' stop-color='%2334d399'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='8' fill='%230e0e14'/%3E%3Ctext x='16' y='23' font-family='system-ui%2C sans-serif' font-weight='700' font-size='18' fill='url(%23g)' text-anchor='middle' letter-spacing='-1'%3EAS%3C/text%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #08080c;
            color: #f0eff2;
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .ambient-glow {
            position: absolute;
            width: 80vw;
            height: 80vh;
            background: radial-gradient(circle at center, rgba(139, 92, 246, 0.08) 0%, transparent 60%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 0;
            opacity: 0;
        }

        .grain {
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 10;
        }

        .landing {
            text-align: center;
            position: relative;
            z-index: 2;
            perspective: 1000px;
        }

        .name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 700;
            letter-spacing: -0.04em;
            line-height: 1.05;
            display: inline-block;
        }

        .name-wrapper {
            overflow: hidden;
            display: block;
        }

        .role {
            font-size: clamp(0.9rem, 1.8vw, 1.15rem);
            font-weight: 300;
            color: rgba(240, 239, 242, 0.5);
            margin-top: 1.5rem;
            letter-spacing: 0.06em;
            opacity: 0;
            transform: translateY(15px);
        }

        .explore-cta {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-top: 3.5rem;
            padding: 16px 36px;
            border-radius: 100px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f0eff2;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            text-decoration: none;
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(15px);
            transition: border-color 0.4s ease, transform 0.2s ease;
        }

        .explore-cta::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, #8b5cf6, #34d399);
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: -1;
        }

        .explore-cta:hover {
            border-color: transparent;
            box-shadow: 0 10px 40px rgba(139, 92, 246, 0.25);
        }

        .explore-cta:hover::before {
            opacity: 0.15;
        }

        .explore-cta svg {
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .explore-cta:hover svg {
            transform: translateX(5px);
        }

        @media (prefers-reduced-motion: reduce) {
            .role, .explore-cta, .ambient-glow {
                opacity: 1 !important;
                transform: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="grain" aria-hidden="true"></div>
    <div class="ambient-glow"></div>
    <div class="landing">
        <h1 class="name">Ajay Sachdev</h1>
        <p class="role">Finance & Operations Manager</p>
    </div>

    <!-- GSAP for 10/10 Animation -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/SplitText.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if (typeof SplitText === "undefined") {
                // Fallback if SplitText is unavailable (it's a Club GreenSock plugin typically, though we attempt to load it)
                gsap.fromTo(".name", { opacity: 0, y: 30 }, { opacity: 1, y: 0, duration: 1.2, ease: "expo.out", delay: 0.2 });
            } else {
                const splitName = new SplitText(".name", { type: "chars, words" });
                gsap.from(splitName.chars, {
                    duration: 1.2,
                    y: 60,
                    rotationX: -90,
                    opacity: 0,
                    stagger: 0.04,
                    ease: "expo.out",
                    transformOrigin: "50% 50% -50",
                    delay: 0.2
                });
            }

            gsap.to(".role", { opacity: 1, y: 0, duration: 1.2, ease: "expo.out", delay: 0.8 });
            gsap.to(".explore-cta", { opacity: 1, y: 0, duration: 1.2, ease: "expo.out", delay: 1.0 });
            gsap.to(".ambient-glow", { opacity: 1, duration: 2.5, ease: "power2.inOut", delay: 0.5 });

            // Magnetic Button Effect
            const btn = document.querySelector('.magnetic-btn');
            if(btn && matchMedia('(pointer:fine)').matches) {
                btn.addEventListener('mousemove', (e) => {
                    const rect = btn.getBoundingClientRect();
                    const x = (e.clientX - rect.left - rect.width/2) * 0.4;
                    const y = (e.clientY - rect.top - rect.height/2) * 0.4;
                    gsap.to(btn, { x: x, y: y, duration: 0.4, ease: "power2.out" });
                });
                btn.addEventListener('mouseleave', () => {
                    gsap.to(btn, { x: 0, y: 0, duration: 0.8, ease: "elastic.out(1, 0.3)" });
                });
            }
        });
    </script>
</body>
</html>
